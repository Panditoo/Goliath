<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polytechnique | L'Exigence Absolue</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #030712;
            --text-color: #e2e8f0;
            --accent-color: #d4af37;
            --x-red: #8a1538;
            --card-bg: #0f172a;
            --border-color: #1e293b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, #020617 0%, var(--bg-color) 100%);
        }

        .motto {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--accent-color);
            font-size: 1rem;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 4px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
        }

        .countdown {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        .countdown span {
            font-weight: 700;
            color: var(--x-red);
        }

        main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 2px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; /* Un peu plus petit pour le côté minimaliste */
            letter-spacing: 5px; /* Espacement large pour l'élégance */
            text-transform: uppercase;
            font-weight: 300; /* Plus fin pour le côté "Luxe" */
            color: var(--text-color);
            border-left: 2px solid var(--x-red); /* Un rappel discret de la couleur de l'école */
            padding-left: 20px;
            margin: 20px 0;
        }   
        h2 {
            font-family: 'Playfair Display', serif;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
            margin-top: 0;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-input-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: white;
        }

        button.add-btn {
            background: var(--x-red);
            color: white;
            border: none;
            padding: 10px 25px;
            font-weight: 700;
            cursor: pointer;
        }

        .task-list { list-style: none; padding: 0; }
        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #475569;
        }

        .timer {
            font-size: 4.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            text-align: center;
        }

        .timer-controls { text-align: center; }
        .timer-controls button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            cursor: pointer;
        }

        .timer-controls button.start {
            background: var(--accent-color);
            color: #000;
            font-weight: 700;
        }

        .mentality-container {
            border-left: 4px solid var(--x-red);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<header>
    <div class="motto">"Pour la Patrie, les Sciences et la Gloire"</div>
    <h1>L'EXIGENCE DU HAUT, LE MÉPRIS DU VIDE</h1>
    <div class="countdown" id="countdown">
        Banque PT dans : <span id="days">000</span>J <span id="hours">00</span>H <span id="mins">00</span>M
    </div>
</header>

<main>
    <div class="card">
        <h2>Ordres de Marche <span style="font-size: 0.8rem; color: #64748b;">(Sync Firebase Actif)</span></h2>
        <div class="task-input-container">
            <input type="text" id="taskInput" placeholder="Ex: Démonstration Cauchy-Lipschitz...">
            <button class="add-btn" onclick="addTask()">Exécuter</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
    </div>

    <div>
        <div class="card">
            <h2 style="justify-content: center;">Immersion</h2>
            <div class="timer" id="timerDisplay">50:00</div>
            <div class="timer-controls">
                <button class="start" onclick="startTimer()">Start</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div class="card mentality-container">
            <div id="quoteText" style="font-style: italic; margin-bottom: 10px;">Chargement...</div>
            <div id="quoteAuthor" style="color: var(--accent-color); font-weight: bold; font-size: 0.8rem;"></div>
        </div>
    </div>
</main>

<script>
    // ÉTAPE 2 : CONFIGURATION ET INITIALISATION
    const firebaseConfig = {
        apiKey: "AIzaSyA9aDL6TtLLs1WUl17NTLxnmaM6V1iP8Pc",
        authDomain: "gloliath.firebaseapp.com",
        databaseURL: "https://gloliath-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gloliath",
        storageBucket: "gloliath.firebasestorage.app",
        messagingSenderId: "699271135679",
        appId: "1:699271135679:web:fd4b0c5dae74aca2f9610a"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const tasksRef = database.ref('tasks');

    // --- 1. COMPTE À REBOURS ---
    const targetDate = new Date("May 3, 2027 08:00:00").getTime();
    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("days").innerText = days.toString().padStart(3, '0');
        document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
        document.getElementById("mins").innerText = minutes.toString().padStart(2, '0');
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // --- 2. GESTION DES TÂCHES AVEC FIREBASE ---
    
    // Écouter les changements en temps réel sur Firebase
    tasksRef.on('value', (snapshot) => {
        const data = snapshot.val();
        renderTasks(data);
    });

    function renderTasks(data) {
        const taskList = document.getElementById('taskList');
        taskList.innerHTML = '';
        if (!data) return;

        // On transforme l'objet Firebase en tableau pour l'afficher
        Object.keys(data).forEach((id) => {
            const task = data[id];
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <span class="task-text" style="cursor:pointer" onclick="toggleTask('${id}', ${task.completed})">${task.text}</span>
                <button style="background:none; border:none; color:#475569; cursor:pointer" onclick="deleteTask('${id}')">✕</button>
            `;
            taskList.appendChild(li);
        });
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (text) {
            tasksRef.push({ text: text, completed: false });
            input.value = '';
        }
    }

    function toggleTask(id, currentStatus) {
        tasksRef.child(id).update({ completed: !currentStatus });
    }

    function deleteTask(id) {
        tasksRef.child(id).remove();
    }

    // --- 3. POMODORO ---
    let timerInterval;
    let timeLeft = 50 * 60;
    let isRunning = false;

    function updateTimerDisplay() {
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            } else {
                clearInterval(timerInterval);
                isRunning = false;
                alert("Fin de session.");
                resetTimer();
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        timeLeft = 50 * 60;
        updateTimerDisplay();
    }

    // --- 4. CITATIONS ---
    const quotes = [{ text: "La rigueur n'est pas une option.", author: "Méthodologie" }];
    document.getElementById('quoteText').innerText = `"${quotes[0].text}"`;
    document.getElementById('quoteAuthor').innerText = `- ${quotes[0].author}`;

</script>
</body>
</html>
